version: '3.8'

services:
  # Phase 7: Deployment (Frontend)
  frontend:
    build: 
      context: ./frontend-nextjs
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend

  # Phase 7: Deployment (Backend)
  backend:
    build:
      context: ./backend-go
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis

  # Phase 4 & 7: AI Integration & Deployment
  ai-engine:
    build:
      context: ./ai-services
      dockerfile: Dockerfile
    ports:
      - "8000:8000"

  # Infrastructure: Database & Cache
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: robosphere
    ports:
      - "5432:5432"

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
